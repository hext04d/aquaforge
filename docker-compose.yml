version: '3.8'

services:
  backend:
    build: ./backend
    container_name: aquaforge-backend
    restart: unless-stopped
    volumes:
      - ./backend/downloads:/app/downloads

  frontend:
    image: nginx:alpine
    container_name: aquaforge-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/out:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
